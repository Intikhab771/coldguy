<!DOCTYPE html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>#COLDGUY - Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Anybody:ital,wght@0,100..900;1,100..900&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <script>
      tailwind.config = {
          darkMode: "class",
          theme: {
              extend: {
                  "colors": {
                      "surface-container-highest": "#e2e2e2",
                      "on-error": "#ffffff",
                      "on-tertiary-container": "#fcfcfc",
                      "surface-variant": "#e2e2e2",
                      "on-error-container": "#93000a",
                      "on-primary": "#ffffff",
                      "inverse-on-surface": "#f0f1f1",
                      "tertiary": "#5c5c5c",
                      "background": "#f9f9f9",
                      "on-surface": "#1a1c1c",
                      "secondary-fixed-dim": "#c5cf16",
                      "secondary": "#5e6300",
                      "primary": "#bb0018",
                      "surface-container-low": "#f3f3f4",
                      "surface-container": "#eeeeee",
                      "secondary-container": "#e1ec3a",
                      "surface-dim": "#dadada",
                      "surface-container-high": "#e8e8e8",
                      "surface": "#f9f9f9"
                  },
                  "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
                  },
                  "spacing": {
                      "gutter": "24px",
                      "stack-gap": "12px",
                      "border-width": "3px",
                      "margin-mobile": "16px",
                      "unit": "4px",
                      "margin-desktop": "40px"
                  },
                  "fontFamily": {
                      "body-md": ["Space Mono"],
                      "label-bold": ["Space Mono"],
                      "headline-xl": ["Anybody"],
                      "body-lg": ["Space Mono"],
                      "code-sm": ["Space Mono"],
                      "headline-lg-mobile": ["Anybody"],
                      "headline-md": ["Anybody"],
                      "headline-lg": ["Anybody"]
                  },
                  "fontSize": {
                      "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                      "label-bold": ["14px", { "lineHeight": "1.2", "fontWeight": "700" }],
                      "headline-xl": ["64px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "900" }],
                      "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                      "code-sm": ["13px", { "lineHeight": "1.4", "fontWeight": "400" }],
                      "headline-lg-mobile": ["32px", { "lineHeight": "1.2", "fontWeight": "800" }],
                      "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "700" }],
                      "headline-lg": ["40px", { "lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "800" }]
                  }
              }
          }
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
